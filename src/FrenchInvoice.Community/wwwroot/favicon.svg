<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="url(#bg)"/>
  <rect x="16" y="10" width="32" height="40" rx="4" ry="4" fill="white" opacity="0.95"/>
  <!-- French tricolor left bar -->
  <rect x="16" y="10" width="3" height="13.3" fill="#002395"/>
  <rect x="16" y="23.3" width="3" height="13.3" fill="#FFFFFF"/>
  <rect x="16" y="36.6" width="3" height="13.4" fill="#ED2939"/>
  <!-- Euro sign -->
  <text x="32" y="35" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, sans-serif" font-weight="bold" font-size="22"
        fill="#1565C0">&#8364;</text>
  <!-- Green check -->
  <circle cx="44" cy="46" r="8" fill="#43A047"/>
  <polyline points="40,46 43,49 49,43" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
