<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5"/>
      <stop offset="100%" style="stop-color:#1E88E5"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="64" ry="64" fill="url(#bg)"/>
  <!-- Invoice/document shape -->
  <rect x="136" y="88" width="240" height="312" rx="16" ry="16" fill="white" opacity="0.95"/>
  <!-- Folded corner -->
  <path d="M336 88 L376 88 L376 128 Z" fill="#E3F2FD"/>
  <path d="M336 88 L336 128 L376 128 Z" fill="#BBDEFB"/>
  <!-- Euro symbol -->
  <g transform="translate(256, 220)">
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
          font-family="Arial, sans-serif" font-weight="bold" font-size="120"
          fill="#1565C0" opacity="0.9">&#8364;</text>
  </g>
  <!-- Lines representing invoice rows -->
  <rect x="168" y="296" width="176" height="8" rx="4" fill="#1565C0" opacity="0.25"/>
  <rect x="168" y="320" width="136" height="8" rx="4" fill="#1565C0" opacity="0.2"/>
  <rect x="168" y="344" width="156" height="8" rx="4" fill="#1565C0" opacity="0.15"/>
  <!-- Checkmark badge (bottom right) -->
  <circle cx="360" cy="376" r="44" fill="url(#accent)"/>
  <circle cx="360" cy="376" r="40" fill="#43A047"/>
  <polyline points="340,376 354,390 382,362" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- French tricolor accent bar -->
  <rect x="136" y="88" width="8" height="312" rx="4" fill="#002395"/>
  <rect x="136" y="88" width="8" height="104" rx="0" fill="#002395"/>
  <rect x="136" y="192" width="8" height="104" fill="#FFFFFF"/>
  <rect x="136" y="296" width="8" height="104" rx="0" fill="#ED2939"/>
</svg>
